<meta charset="utf-8"><title>과목 목록</title><link rel="stylesheet" href="assets/site.css"><script src="assets/auth.js"></script><div class="top"><div class="tbar"><div class="brand"><a href="index.html">평가 자료</a></div><div class="tuser" id="tUser"><b id="tName"></b><button id="tOut" type="button">로그아웃</button></div></div></div><script>EXAM_AUTH.paintTop("");</script><div class="wrap"><h1 class="only">과목 목록</h1>
<div class="gate" id="gate">
  <form class="gbox" id="gForm">
    <h2>로그인</h2>
    <input id="gu" placeholder="아이디" autocomplete="username" autofocus>
    <input id="gp" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="gDo" type="submit">들어가기</button>
    <p class="gmsg" id="gmsg"></p>
  </form>
</div>

<div class="note admonly" id="cNote"><b>과목 관리</b> — 추가하거나 지운 것은 이 브라우저에만 남는다.
<b>설정 파일 저장</b> 을 눌러 <code>assets/courses.js</code> 에 덮어쓴 뒤 git 에 올려야 모두에게 적용된다.
과목 페이지를 만들면 <code>courses/</code> 에 저장할 위치를 묻는다.
<form class="cform" id="cForm">
  <input id="cName" placeholder="과목명" required>
  <input id="cPeriod" placeholder="기간 (예: 2026-02-24 ~ 2026-08-12)">
  <input id="cHours" placeholder="시간 (예: 900시간)">
  <label class="cchk"><input type="checkbox" id="cMake" checked> 과목 페이지도 만들기</label>
  <button type="submit">과목 추가</button>
</form>
<div style="margin-top:8px">
  <button id="bSaveCourses" type="button">설정 파일 저장</button>
  <button id="bResetCourses" type="button">되돌리기</button>
  <span id="cMsg" style="margin-left:10px;font-size:12.5px"></span>
</div></div>
<div class="cgrid" id="cards"></div><footer>담당 정우균</footer></div>
<script src="assets/courses.js"></script>
<script>
(function(){
  var CKEY='exam_courses';
  function base(){ return (window.EXAM_COURSES||[]).slice(); }
  function list(){
    try{ var d=localStorage.getItem(CKEY); if(d) return JSON.parse(d); }catch(e){}
    return base();
  }
  function save(v){ try{ localStorage.setItem(CKEY, JSON.stringify(v)); }catch(e){
    alert('저장 공간이 부족하다.'); } }
  function esc(s){ return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function draw(){
    var cs=list(), adm=EXAM_AUTH.isAdmin(), h='';
    cs.forEach(function(c,i){
      var meta='<dl><dt>기간</dt><dd>'+esc(c.period||'-')+'</dd>'+
               '<dt>시간</dt><dd>'+esc(c.hours||'-')+'</dd></dl>';
      var del = adm ? '<button class="cdel" data-i="'+i+'" type="button">지우기</button>' : '';
      if(c.page)
        h+='<div class="cwrap"><a class="ccard" href="'+esc(c.page)+'"><h3>'+esc(c.name)+'</h3>'+
           meta+'<span class="go">평가 모듈 목록</span></a>'+del+'</div>';
      else
        h+='<div class="cwrap"><div class="ccard na"><h3>'+esc(c.name)+'</h3>'+
           meta+'<span class="go">준비 중</span></div>'+del+'</div>';
    });
    document.getElementById('cards').innerHTML=h;
    document.querySelectorAll('.cdel').forEach(function(b){
      b.onclick=function(){
        var v=list(), i=+b.dataset.i;
        if(!confirm('"'+v[i].name+'" 을 지운다. 계속할까?')) return;
        v.splice(i,1); save(v); draw();
      };
    });
  }
  window.__drawCards = draw;

  /* 새 과목 페이지 HTML.
     모듈이 아직 없으므로 '준비 중' 안내만 담은 빈 과목 페이지를 만든다.
     모듈이 생기면 이 파일에 표를 채워 넣으면 된다.
     줄바꿈은 문자열에 넣지 않고 join 으로 만든다(문자열이 끊기는 것을 막는다). */
  function pageHtml(c){
    var NL=String.fromCharCode(10);
    return [
      '<meta charset="utf-8"><title>'+esc(c.name)+'</title>',
      '<link rel="stylesheet" href="../assets/site.css">',
      '<script src="../assets/auth.js"><\/script>',
      '<script>EXAM_AUTH.guard("../");<\/script>',
      '<div class="top"><div class="tbar">',
      '<div class="brand"><a href="../index.html">평가 자료</a>',
      '<small>'+esc(c.name)+'</small></div>',
      '<div class="tuser" id="tUser"><b id="tName"></b>',
      '<button id="tOut" type="button">로그아웃</button></div></div></div>',
      '<script>EXAM_AUTH.paintTop("../");<\/script>',
      '<div class="wrap"><h1>능력단위 평가 모듈 목록</h1>',
      '<p class="sub">'+esc(c.name)+
        (c.hours ? ' · '+esc(c.hours) : '')+(c.period ? ' · '+esc(c.period) : '')+'</p>',
      '<div class="empty">평가 모듈이 아직 등록되지 않았다.<br>',
      '<a href="../index.html">과목 목록으로</a></div>',
      '<footer>'+esc(c.name)+(c.period ? ' · '+esc(c.period) : '')+' · 담당 정우균</footer>',
      '</div>', ''
    ].join(NL);
  }
  async function putFile(name, txt){
    if(window.showSaveFilePicker){
      try{
        var h=await showSaveFilePicker({suggestedName:name,
          types:[{description:'HTML',accept:{'text/html':['.html']}}]});
        var w=await h.createWritable(); await w.write(txt); await w.close();
        return 'saved';
      }catch(e){ if(e.name==='AbortError') return 'cancel'; }
    }
    var a=document.createElement('a');
    a.href='data:text/html;charset=utf-8,'+encodeURIComponent(txt);
    a.download=name; document.body.appendChild(a); a.click(); a.remove();
    return 'download';
  }

  var cf=document.getElementById('cForm');
  if(cf) cf.addEventListener('submit',async function(e){
    e.preventDefault();
    var v=list(), msg=document.getElementById('cMsg');
    // id 는 c1,c2... 중 안 쓰는 다음 번호로 (지웠다 추가해도 겹치지 않게)
    var n=1, used={}; v.forEach(function(x){ used[x.id]=1; });
    while(used['c'+n]) n++;
    var c={id:'c'+n, name:document.getElementById('cName').value.trim(),
           period:document.getElementById('cPeriod').value.trim(),
           hours:document.getElementById('cHours').value.trim(), page:''};
    var make=document.getElementById('cMake').checked;
    if(make) c.page='courses/'+c.id+'.html';
    v.push(c); save(v); draw();
    cf.reset(); document.getElementById('cMake').checked=true;

    if(!make){ msg.textContent='추가했다. 설정 파일 저장을 눌러야 남는다.'; return; }
    var r=await putFile(c.id+'.html', pageHtml(c));
    if(r==='cancel'){
      c.page=''; save(v); draw();          // 페이지를 안 만들었으면 '준비 중' 으로 되돌린다
      msg.textContent='페이지를 만들지 않았다. 준비 중 카드로 두었다.';
    }else if(r==='saved'){
      msg.textContent='courses/'+c.id+'.html 을 만들었다. 설정 파일 저장까지 누른 뒤 git 에 올린다.';
    }else{
      msg.textContent=c.id+'.html 을 내려받았다. courses/ 에 넣고 설정 파일 저장까지 누른 뒤 git 에 올린다.';
    }
  });
  var br=document.getElementById('bResetCourses');
  if(br) br.onclick=function(){
    if(!confirm('파일에 저장된 내용으로 되돌린다. 계속할까?')) return;
    try{ localStorage.removeItem(CKEY); }catch(e){}
    draw(); document.getElementById('cMsg').textContent='';
  };
  var bs=document.getElementById('bSaveCourses');
  if(bs) bs.onclick=async function(){
    var txt=[
      '/* 과목 목록.',
      ' * index.html 의 [설정 파일 저장] 이 이 파일을 덮어쓴다. 손으로 고쳐도 된다.',
      ' * 고친 뒤 git 에 올려야 모두에게 적용된다.',
      ' */',
      'window.EXAM_COURSES = '+JSON.stringify(list(),null,2)+';',
      ''
    ].join(String.fromCharCode(10));
    var m=document.getElementById('cMsg');
    if(window.showSaveFilePicker){
      try{
        var h=await showSaveFilePicker({suggestedName:'courses.js',
          types:[{description:'JavaScript',accept:{'text/javascript':['.js']}}]});
        var w=await h.createWritable(); await w.write(txt); await w.close();
        m.textContent='저장했다. git add/commit/push 하면 적용된다.'; return;
      }catch(e){ if(e.name==='AbortError'){ m.textContent=''; return; } }
    }
    var a=document.createElement('a');
    a.href='data:text/javascript;charset=utf-8,'+encodeURIComponent(txt);
    a.download='courses.js'; document.body.appendChild(a); a.click(); a.remove();
    m.textContent='courses.js 를 내려받았다. assets/courses.js 에 덮어쓴 뒤 git 에 올린다.';
  };
})();
</script>

<script>
(function(){
  var gate=document.getElementById('gate'), cards=document.getElementById('cards'),
      msg=document.getElementById('gmsg');
  function paint(){
    var on=EXAM_AUTH.signedIn();
    gate.style.display = on ? 'none' : '';
    cards.style.display = on ? '' : 'none';
    document.body.classList.toggle('admin', EXAM_AUTH.isAdmin());
    EXAM_AUTH.paintTop('');
    if(on && window.__drawCards) window.__drawCards();
  }
  document.getElementById('gForm').addEventListener('submit', async function(e){
    e.preventDefault();
    msg.className='gmsg';
    var r=await EXAM_AUTH.signIn(document.getElementById('gu').value,
                                 document.getElementById('gp').value);
    if(r){ document.getElementById('gp').value=''; paint(); }
    else { msg.className='gmsg err'; msg.textContent='아이디 또는 비밀번호가 맞지 않다.'; }
  });
  paint();
})();
</script>
