<meta charset="utf-8"><title>과목 목록</title><link rel="stylesheet" href="assets/site.css"><script src="assets/auth.js"></script><div class="top"><div class="tbar"><div class="brand"><a href="index.html">평가 자료</a></div><div class="tuser" id="tUser"><b id="tName"></b><button id="tOut" type="button">로그아웃</button></div></div></div><script>EXAM_AUTH.paintTop("");</script><div class="wrap"><h1 class="only">과목 목록</h1>
<div class="gate" id="gate">
  <form class="gbox" id="gForm">
    <h2>로그인</h2>
    <input id="gu" placeholder="아이디" autocomplete="username" autofocus>
    <input id="gp" type="password" placeholder="비밀번호" autocomplete="current-password">
    <button id="gDo" type="submit">들어가기</button>
    <p class="gmsg" id="gmsg"></p>
  </form>
</div>
<div class="cgrid" id="cards"><a class="ccard" href="courses/c1.html"><h3>(디지털 컨버전스) 공공데이터 융합 풀스택 개발자 양성과정E</h3><dl><dt>기간</dt><dd>2026-02-24 ~ 2026-08-10</dd><dt>시간</dt><dd>900시간</dd></dl><span class="go">평가 모듈 목록</span></a><div class="ccard na"><h3>정보처리산업기사 과정평가형</h3><dl><dt>기간</dt><dd>-</dd><dt>시간</dt><dd>-</dd></dl><span class="go">준비 중</span></div><div class="ccard na"><h3>빅데이터 UI 전문가 양성과정</h3><dl><dt>기간</dt><dd>-</dd><dt>시간</dt><dd>-</dd></dl><span class="go">준비 중</span></div></div><footer>담당 정우균</footer></div>
<script>
(function(){
  var gate=document.getElementById('gate'), cards=document.getElementById('cards'),
      msg=document.getElementById('gmsg');
  function paint(){
    var on=EXAM_AUTH.signedIn();
    gate.style.display = on ? 'none' : '';
    cards.style.display = on ? '' : 'none';
    EXAM_AUTH.paintTop('');
  }
  document.getElementById('gForm').addEventListener('submit', async function(e){
    e.preventDefault();
    msg.className='gmsg';
    var r=await EXAM_AUTH.signIn(document.getElementById('gu').value,
                                 document.getElementById('gp').value);
    if(r){ document.getElementById('gp').value=''; paint(); }
    else { msg.className='gmsg err'; msg.textContent='아이디 또는 비밀번호가 맞지 않다.'; }
  });
  paint();
})();
</script>
